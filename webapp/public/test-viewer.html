<!DOCTYPE html>
<html>
<head>
  <title>Splat Test Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 14px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const info = document.getElementById('info');
    const modelUrl = '/models/3afa2f9e-5063-4681-9967-52853a2c5637.splat';

    info.textContent = 'Fetching ' + modelUrl + '...';

    // Fetch and parse
    const res = await fetch(modelUrl);
    if (!res.ok) { info.textContent = 'HTTP ' + res.status; throw new Error('fetch failed'); }
    const buffer = await res.arrayBuffer();
    info.textContent = `Loaded ${(buffer.byteLength / 1e6).toFixed(1)} MB, parsing...`;

    const BYTES = 32;
    const count = Math.floor(buffer.byteLength / BYTES);
    const view = new DataView(buffer);

    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);

    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;

    for (let i = 0; i < count; i++) {
      const off = i * BYTES;
      const x = view.getFloat32(off, true);
      const y = view.getFloat32(off + 4, true);
      const z = view.getFloat32(off + 8, true);
      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
      if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;

      const sx = view.getFloat32(off + 12, true);
      const sy = view.getFloat32(off + 16, true);
      const sz = view.getFloat32(off + 20, true);
      sizes[i] = (sx + sy + sz) / 3.0;

      colors[i * 3]     = view.getUint8(off + 24) / 255;
      colors[i * 3 + 1] = view.getUint8(off + 25) / 255;
      colors[i * 3 + 2] = view.getUint8(off + 26) / 255;
    }

    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2, cz = (minZ + maxZ) / 2;
    const ex = maxX - minX, ey = maxY - minY, ez = maxZ - minZ;
    const maxExt = Math.max(ex, ey, ez, 1);

    info.textContent = `${count.toLocaleString()} splats | center=(${cx.toFixed(1)},${cy.toFixed(1)},${cz.toFixed(1)}) | extent=(${ex.toFixed(1)},${ey.toFixed(1)},${ez.toFixed(1)}) | scale range=[${Math.min(...sizes.slice(0,100)).toFixed(4)}, ${Math.max(...sizes.slice(0,100)).toFixed(4)}]`;

    // Three.js scene
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x111111);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    const camDist = maxExt * 1.5;
    camera.position.set(cx + camDist * 0.5, cy + camDist * 0.3, cz + camDist * 0.8);
    camera.lookAt(cx, cy, cz);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(cx, cy, cz);
    controls.enableDamping = true;
    controls.update();

    // Point cloud
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    // Simple PointsMaterial first to verify data renders
    const mat = new THREE.PointsMaterial({
      size: 0.02,
      vertexColors: true,
      sizeAttenuation: true,
    });
    const pts = new THREE.Points(geom, mat);
    scene.add(pts);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    console.log('Rendering', count, 'points');
  </script>
</body>
</html>
